# =====================================================================
# render.yaml — Render lee este archivo y arma el servicio solo.
# No hace falta configurar nada a mano salvo pegar 3 secretos.
# =====================================================================
services:
  - type: web
    name: matchapply-api
    runtime: node
    plan: free                      # 750 h/mes, sin tarjeta
    region: oregon
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: PGSSL
        value: "true"
      - key: LLM_MODEL
        value: claude-sonnet-5

      # --- Se generan/pegan en el panel de Render (marcados como secretos) ---
      - key: JWT_SECRET
        generateValue: true         # Render genera un secreto aleatorio seguro

      - key: DATABASE_URL
        sync: false                 # ← pegar la connection string de Neon

      - key: APP_URL
        sync: false                 # ← pegar la URL de Cloudflare Pages

      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false                 # ← pegar la API key de Resend
      - key: MAIL_FROM
        value: "MatchApply <onboarding@resend.dev>"

      # --- Opcional: sin esto, el CV se procesa con el motor local ---
      - key: ANTHROPIC_API_KEY
        sync: false
